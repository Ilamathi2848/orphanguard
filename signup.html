<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - OrphanGuard</title>

    <style>
        /* -------------------- GLOBAL ------------------------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(#ffd56b, #ff914d);
        }

        /* -------------------- SIGNUP CONTAINER ------------------------- */
        .signup-container {
            width: 420px;
            background: #ffffff;
            padding: 40px 35px;
            border-radius: 20px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.2);
            animation: fadeIn 0.8s ease-in-out;
            text-align: center;
        }

        .signup-container h2 {
            font-size: 30px;
            color: #1a2b4c;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .signup-container p {
            color: #333;
            margin-bottom: 18px;
        }

        /* -------------------- INPUTS ------------------------- */
        .input-group {
            position: relative;
            margin-bottom: 22px;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 2px solid #ddd;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #ff914d;
            box-shadow: 0 0 4px rgba(255,145,77,0.5);
        }

        .input-group label {
            position: absolute;
            top: 15px;
            left: 16px;
            color: #666;
            transition: 0.3s;
            pointer-events: none;
            background: white;
            padding: 0 4px;
        }

        .input-group input:focus ~ label,
        .input-group input:not(:placeholder-shown) ~ label {
            top: -9px;
            font-size: 12px;
            color: #ff914d;
        }

        /* -------------------- BUTTON ------------------------- */
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            background: #1a2b4c;
            color: white;
            border-radius: 12px;
            font-size: 17px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 5px;
        }

        .btn:hover {
            background: #243a63;
        }

        .login-link {
            margin-top: 15px;
            font-size: 14px;
            color: #333;
        }

        .login-link a {
            color: #ff914d;
            font-weight: 600;
            text-decoration: none;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        /* Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

</head>

<body>

<div class="signup-container">
    <h2>Create Your Account</h2>
    <p>Join us in making a difference</p>

    <form id="signupForm">

        <div class="input-group">
            <input type="text" id="name" name="name" required placeholder=" ">
            <label>Your Name</label>
        </div>

        <div class="input-group">
            <input type="email" id="email" name="email" required placeholder=" ">
            <label>Your Email</label>
        </div>

        <div class="input-group">
            <input type="password" id="password" name="password" required placeholder=" ">
            <label>Password</label>
        </div>

        <div class="input-group">
            <input type="password" id="confirm_password" name="confirm_password" required placeholder=" ">
            <label>Confirm Password</label>
        </div>

        <button type="submit" class="btn">Sign Up</button>
    </form>

    <p class="login-link">Already have an account? <a href="login.html">Log in</a></p>
</div>

<script src="signup.js"></script>

</body>
</html>
